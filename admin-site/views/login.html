<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --bg-accent: #0d1b2d;
        --surface: rgba(11, 22, 38, 0.9);
        --border: rgba(148, 163, 184, 0.18);
        --text: #e5eefb;
        --muted: #9fb2cb;
        --primary: #7c9cff;
        --primary-strong: #5f7dff;
        --shadow: 0 30px 80px rgba(3, 8, 20, 0.45);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(124, 156, 255, 0.2), transparent 24%),
          radial-gradient(circle at bottom right, rgba(45, 212, 191, 0.14), transparent 26%),
          linear-gradient(160deg, var(--bg), var(--bg-accent));
      }

      .card {
        width: min(100%, 460px);
        margin: 24px;
        padding: 30px;
        border-radius: 28px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 18px;
        margin-bottom: 18px;
        background: linear-gradient(135deg, var(--primary), #2dd4bf);
        color: #06111d;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      h1 { margin: 0 0 10px; font-size: 2rem; line-height: 1.1; }
      p { margin: 0 0 18px; color: var(--muted); line-height: 1.6; }

      .field { margin-bottom: 16px; }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #dbe7f7;
      }

      input {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(6, 16, 29, 0.72);
        color: var(--text);
        padding: 13px 14px;
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: rgba(124, 156, 255, 0.7);
        box-shadow: 0 0 0 3px rgba(124, 156, 255, 0.12);
      }

      .btn {
        width: 100%;
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        font-weight: 700;
        cursor: pointer;
        color: white;
        background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        box-shadow: 0 12px 30px rgba(95, 125, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">TM</div>
      <h1>Admin login</h1>
      <p>Sign in to open the production blog dashboard and manage posts.</p>
      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
    </main>
  </body>
</html>
