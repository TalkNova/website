<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Cube Logo Preview</title>
  <style>
    /* Reset and Layout Styling (For demonstration purposes) */
    body {
      margin: 0;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f7fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .demo-card {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .label {
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
    }

    /* ========================================== */
    /* CUBE LOGO CORE STYLES            */
    /* ========================================== */
    
    .logo-container {
      display: inline-block;
      position: relative;
      /* Default to Desktop Size variables */
      --cube-size: 46px; 
      width: var(--cube-size);
      height: var(--cube-size);
      perspective: 1000px;
    }

    /* Force Mobile Sizing specifically for the preview card */
    .force-mobile {
      --cube-size: 34px !important;
    }

    /* Global Responsive Switch: Automatically drops to mobile sizing on smaller screens */
    @media (max-width: 768px) {
      .logo-container {
        --cube-size: 34px;
      }
    }

    /* The 3D Canvas */
    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(60deg) rotateZ(45deg); 
    }

    /* Shared geometric panel properties */
    .face {
      position: absolute;
      width: 50%;
      height: 50%;
      box-sizing: border-box;
    }

    /* Top Diamond Face */
    .face.top {
      top: 0;
      left: 0;
      border: 3px solid #2b6cb0;
      background: rgba(255, 255, 255, 0.95);
      transform: translateZ(calc(var(--cube-size) * 0.25));
      box-shadow: inset 0 0 4px rgba(43, 108, 176, 0.2);
    }

    /* Left Face */
    .face.left {
      bottom: 0;
      left: 0;
      border-left: 3px solid #1a365d;
      border-bottom: 3px solid #1a365d;
      border-right: 1.5px solid rgba(43, 108, 176, 0.4);
      background: linear-gradient(135deg, #2b6cb0, #1a365d);
      transform-origin: bottom left;
      transform: rotateX(-90deg);
    }

    /* Right Face */
    .face.right {
      top: 0;
      right: 0;
      border-right: 3px solid #2b6cb0;
      border-top: 3px solid #2b6cb0;
      border-left: 1.5px solid rgba(43, 108, 176, 0.4);
      background: linear-gradient(45deg, #3182ce, #2b6cb0);
      transform-origin: top right;
      transform: rotateY(90deg);
    }
  </style>
</head>
<body>

  <div class="demo-card">
    <span class="label">Standard Desktop View (46px)</span>
    <div class="logo-container">
      <div class="cube">
        <div class="face top"></div>
        <div class="face left"></div>
        <div class="face right"></div>
      </div>
    </div>
  </div>

  <div class="demo-card">
    <span class="label">Mobile / Compact View (34px)</span>
    <div class="logo-container force-mobile">
      <div class="cube">
        <div class="face top"></div>
        <div class="face left"></div>
        <div class="face right"></div>
      </div>
    </div>
  </div>

</body>
</html>
