<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - ThatMatter</title>
    <meta name="description" content="ThatMatter blog post">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2" style="top: 50%; right: -200px;"></div>

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="/images/logo.png" alt="ThatMatter Logo" style="height: 100px;">
            </a>
            <button class="mobile-toggle"><i class="fa-solid fa-bars"></i></button>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/about">About Us</a>
                <a href="/pricing">Pricing</a>
                <a href="/blog">Blog</a>
                <a href="/contact">Contact</a>
                <a href="/login" class="btn btn-primary btn-sm">Login</a>
            </div>
        </div>
    </nav>

    <!-- Blog Post Header -->
    <header class="section" style="padding-top: 150px; padding-bottom: 50px;">
        <div class="container animate-on-scroll fade-up" id="blog-post-shell">
            <a href="/blog" style="color: var(--accent-primary); font-weight: 600; margin-bottom: 1rem; display: inline-block; text-decoration: none; transition: var(--transition-smooth);">
                <i class="fa-solid fa-arrow-left"></i> Back to Blog
            </a>
        </div>
    </header>

    <!-- Blog Content -->
    <section class="section" style="padding-top: 0;">
        <div class="container" style="max-width: 900px; margin: 0 auto;" id="blog-post-content">
            <div class="animate-on-scroll fade-up delay-100" id="blog-post-body" style="font-size: 1.05rem; color: var(--text-secondary); line-height: 1.8;">
                <p>Loading article...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <a href="/" class="logo mb-2" style="font-size: 1.2rem;">
                        <img src="/images/logo.png" alt="ThatMatter Logo" style="height: 100px;">
                    </a>
                    <p>Revolutionizing WhatsApp marketing and customer support for modern businesses.</p>
                </div>
                <div class="footer-col">
                    <h4>Product</h4>
                    <div class="footer-links">
                        <a href="/pricing">Pricing</a>
                        <a href="/about">Features</a>
                    </div>
                </div>
                <div class="footer-col">
                    <h4>Company</h4>
                    <div class="footer-links">
                        <a href="/about">About Us</a>
                        <a href="/blog">Blog</a>
                        <a href="/contact">Contact</a>
                    </div>
                </div>
                <div class="footer-col">
                    <h4>Legal</h4>
                    <div class="footer-links">
                        <a href="#">Privacy Policy</a>
                        <a href="#">Terms of Service</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ThatMatter. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        const escapeHtml = (value) => String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const renderInlineMarkdown = (value) => {
            const escaped = escapeHtml(value);
            return escaped
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');
        };

        const renderMarkdownBlock = (value) => {
            const lines = String(value || '').replace(/\r\n/g, '\n').split('\n');
            const html = [];
            let listItems = [];

            const flushList = () => {
                if (listItems.length) {
                    html.push(`<ul style="padding-left: 1.4rem; margin: 0 0 1.2rem 0;">${listItems.map(item => `<li style="margin-bottom: 0.45rem;">${renderInlineMarkdown(item)}</li>`).join('')}</ul>`);
                    listItems = [];
                }
            };

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) {
                    flushList();
                    return;
                }

                if (trimmed.startsWith('### ')) {
                    flushList();
                    html.push(`<h3 style="color: var(--text-primary); margin-top: 2rem; margin-bottom: 1rem;">${renderInlineMarkdown(trimmed.slice(4))}</h3>`);
                    return;
                }

                if (trimmed.startsWith('## ')) {
                    flushList();
                    html.push(`<h2 style="color: var(--text-primary); margin-top: 2.4rem; margin-bottom: 1rem;">${renderInlineMarkdown(trimmed.slice(3))}</h2>`);
                    return;
                }

                if (trimmed.startsWith('# ')) {
                    flushList();
                    html.push(`<h1 style="color: var(--text-primary); margin-top: 0; margin-bottom: 1rem;">${renderInlineMarkdown(trimmed.slice(2))}</h1>`);
                    return;
                }

                if (trimmed.startsWith('- ')) {
                    listItems.push(trimmed.slice(2));
                    return;
                }

                flushList();
                html.push(`<p style="margin-bottom: 1.15rem;">${renderInlineMarkdown(trimmed)}</p>`);
            });

            flushList();
            return html.join('');
        };

        const markdownToHtml = (content) => {
            if (Array.isArray(content)) {
                return content.map(block => {
                    if (block.type === 'markdown') {
                        return renderMarkdownBlock(block.text);
                    }
                    return `<p style="margin-bottom: 1.15rem;">${escapeHtml(block.text || '')}</p>`;
                }).join('');
            }

            return renderMarkdownBlock(content || '');
        };

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const body = document.getElementById('blog-post-body');
        const shell = document.getElementById('blog-post-shell');

        if (!slug) {
            body.innerHTML = '<p>Missing blog slug.</p>';
        } else {
            fetch(`/api/blog/${encodeURIComponent(slug)}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Blog post not found');
                    }
                    return response.json();
                })
                .then(post => {
                    document.title = `${post.title} - ThatMatter`;
                    const metaDescription = document.querySelector('meta[name="description"]');
                    if (metaDescription) {
                        metaDescription.setAttribute('content', post.excerpt || post.title);
                    }

                    shell.innerHTML = `
                        <a href="/blog" style="color: var(--accent-primary); font-weight: 600; margin-bottom: 1rem; display: inline-block; text-decoration: none; transition: var(--transition-smooth);">
                            <i class="fa-solid fa-arrow-left"></i> Back to Blog
                        </a>
                        <div style="display:flex; gap:0.75rem; flex-wrap:wrap; align-items:center; margin-bottom:0.75rem; color: var(--text-muted); font-family: 'Outfit', sans-serif;">
                            ${post.category ? `<span style="color: var(--accent-primary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;">${post.category}</span>` : ''}
                            <span>${post.publishedAt ? new Date(post.publishedAt).toLocaleDateString() : ''}${post.readingTime ? ` • ${post.readingTime} min read` : ''}</span>
                        </div>
                        <h1 style="font-size: clamp(2.4rem, 5vw, 3.5rem); margin-bottom: 1rem; line-height: 1.1;">${post.title}</h1>
                        <p style="max-width: 720px; color: var(--text-secondary); font-size: 1.08rem; line-height: 1.7; margin-bottom: 1.75rem;">${post.excerpt || ''}</p>
                        ${post.author ? `
                            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                                <div style="width: 50px; height: 50px; border-radius: 50%; background: var(--bg-tertiary); overflow: hidden; display: flex; align-items: center; justify-content: center;">
                                    ${post.author.avatar ? `<img src="${post.author.avatar}" alt="${post.author.name}" style="width:100%; height:100%; object-fit: cover;">` : `<span style="color: var(--text-primary); font-weight: 700;">${(post.author.name || '?').slice(0, 1)}</span>`}
                                </div>
                                <div>
                                    <h4 style="margin: 0; font-size: 1.1rem;">${post.author.name || ''}</h4>
                                </div>
                            </div>
                        ` : ''}
                        ${post.coverImage ? `
                            <div style="border-radius: 20px; overflow: hidden; margin-bottom: 2.5rem; box-shadow: var(--glass-shadow);">
                                <img src="${post.coverImage}" alt="${post.title}" style="width: 100%; max-height: 500px; object-fit: cover;">
                            </div>
                        ` : ''}
                    `;

                    const tagsHtml = Array.isArray(post.tags) && post.tags.length
                        ? `<div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin: 0 0 2rem 0;">${post.tags.map(tag => `<span style="font-size:0.8rem; padding:0.35rem 0.75rem; border-radius:999px; background:rgba(255,255,255,0.08); color:var(--text-secondary);">${tag}</span>`).join('')}</div>`
                        : '';

                    const contentHtml = markdownToHtml(post.content);
                    const shareUrl = window.location.href;

                    body.innerHTML = `
                        ${tagsHtml}
                        <div style="font-size: 1.05rem; color: var(--text-secondary); line-height: 1.8;">
                            ${contentHtml}
                        </div>
                        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 3rem 0;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                            <div>
                                <h4 style="margin-bottom: 0.5rem;">Share this article</h4>
                            </div>
                            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                                <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(post.title)}" target="_blank" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 10px;"><i class="fa-brands fa-twitter"></i> Twitter</a>
                                <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}" target="_blank" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 10px;"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
                                <a href="https://wa.me/?text=${encodeURIComponent(post.title + ' ' + shareUrl)}" target="_blank" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 10px;"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                            </div>
                        </div>
                    `;
                })
                .catch(err => {
                    body.innerHTML = `<p style="color:red;">${err.message}</p>`;
                });
        }
    </script>
</body>
</html>
