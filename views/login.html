<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ThatMatter</title>
    <meta name="description" content="Login to your ThatMatter account.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 20;
        }

        .back-home:hover {
            color: var(--accent-primary);
        }
    </style>
    <link rel="icon" type="image/png" href="/favicon.png">
</head>

<body class="animated-gradient-bg">

    <a href="/" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-container animate-on-scroll zoom-in">
        <div class="glass-card" style="padding: 3rem 2rem;">
            <div class="text-center mb-4">
                <a href="/" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                    <img src="/images/logo.png" alt="ThatMatter Logo" style="height: 100px;">
                </a>
                <h2 style="margin: 0;">Welcome Back</h2>
                <p class="text-muted">Sign in to manage your campaigns</p>
            </div>

            <form action="/user/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="username"
                        required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem;">
                <span class="text-muted">Don't have an account?</span> <a href="/pricing"
                    style="color: var(--accent-primary); font-weight: bold;">Sign up</a>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>

</html>
